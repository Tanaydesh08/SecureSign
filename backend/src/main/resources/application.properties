# Application
# ==========================================
spring.application.name=SecureSign

# Server Configuration
# ==========================================
server.port=8080

# PostgreSQL Database
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/securesign
spring.datasource.username=postgres
spring.datasource.password=tanay
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# File Upload Configuration
# ==========================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Logging
# ==========================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# JWT Configuration
# ==========================================
jwt.secret=ThisIsAVerySecureSecretKeyForSecureSignApplication123456789012345
jwt.expiration=86400000

# File Storage
# ==========================================
file.upload-dir=uploads/

# Email Configuration
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true